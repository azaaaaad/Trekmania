<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trekmania</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #007bff; --bg-color: #f4f6f8; --card-bg: #ffffff; --text-main: #333333; --text-muted: #888888; --border-color: #e0e0e0; --danger: #ff4d4f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        /* AUTH SCREENS (Login & Onboarding) */
        #login-screen, #onboarding-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: var(--card-bg); padding: 20px; }
        #onboarding-screen { display: none; } /* Hidden by default */
        .auth-form { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .auth-form h1, .auth-form h2 { text-align: center; color: var(--primary-blue); margin-bottom: 5px; }
        .auth-form input { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; }
        .auth-form button { padding: 14px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-form button.secondary { background-color: transparent; color: var(--primary-blue); border: 2px solid var(--primary-blue); }

        #main-app { display: none; padding-bottom: 70px; }
        .app-header { background-color: var(--card-bg); padding: 15px 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .app-section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .app-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background-color: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .post-user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
        .post-user-info:hover { opacity: 0.7; }
        .avatar { width: 40px; height: 40px; background-color: var(--primary-blue); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-muted); margin-top: 10px; }
        
        .post-actions { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; color: var(--text-muted); font-size: 18px; }
        .action-btn { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .action-btn:hover { color: var(--primary-blue); }
        .action-btn.liked { color: var(--primary-blue); }
        .delete-btn { color: var(--danger); cursor: pointer; padding: 5px; }
        
        .comments-display { margin-top: 10px; font-size: 13px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .comment-item { margin-bottom: 5px; }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .form-group label { font-size: 14px; font-weight: bold; color: var(--text-main); }
        .form-group input { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; }
        .submit-btn { width: 100%; padding: 12px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .search-result-item { display: flex; align-items: center; gap: 10px; padding: 15px; background: var(--card-bg); border-radius: 10px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 20px 0; }
        .profile-avatar { width: 90px; height: 90px; font-size: 36px; margin-bottom: 5px; }
        .profile-stats-container { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .stat-box { display: flex; flex-direction: column; align-items: center; font-size: 14px; color: var(--text-muted); }
        .stat-number { font-size: 20px; font-weight: bold; color: var(--text-main); }
        #edit-profile-section { display: none; background-color: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid var(--border-color); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 12px; gap: 5px; width: 25%; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--primary-blue); }
        .header-back-btn { display: none; cursor: pointer; color: var(--primary-blue); font-size: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-form">
            <h1>Trekmania</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password (min 6 chars)">
            <button id="login-btn">Log In</button>
            <button id="signup-btn" class="secondary">Sign Up (New User)</button>
            <p id="auth-error" style="color: red; font-size: 14px; text-align: center; display: none;"></p>
        </div>
    </div>

    <div id="onboarding-screen">
        <div class="auth-form">
            <h2>Welcome to Trekmania! 🏔️</h2>
            <p style="color: var(--text-muted); text-align: center; margin-bottom: 20px;">Pick a unique username to get started.</p>
            <input type="text" id="onboarding-username" placeholder="Username (e.g. mountain_goat)">
            <button id="complete-onboarding-btn">Complete Setup</button>
        </div>
    </div>

    <div id="main-app">
        <div class="app-header">
            <i class="fa-solid fa-arrow-left header-back-btn" id="header-back-btn"></i>
            <span id="header-title">Home</span>
            <div style="width: 20px;"></div>
        </div>

        <div id="home-tab" class="app-section active">
            <div id="feed-container"><p style="text-align:center; color: var(--text-muted);">Loading posts...</p></div>
        </div>

        <div id="search-tab" class="app-section">
            <div class="form-group"><input type="text" id="search-input" placeholder="Search for trekkers by username..."></div>
            <div id="search-results-container"><p style="text-align:center; color: var(--text-muted); font-size: 14px;">Type a username to start searching</p></div>
        </div>

        <div id="trek-tab" class="app-section">
            <div class="card">
                <h3 style="margin-top: 0;">Log a New Trek</h3>
                <div class="form-group"><label>Trek Name</label><input type="text" id="trek-name" placeholder="e.g. Leopard's Trail"></div>
                <div class="form-group"><label>Elevation Gain (m)</label><input type="number" id="trek-elevation" placeholder="e.g. 320"></div>
                <div class="form-group"><label>Time (hours)</label><input type="number" id="trek-time" placeholder="e.g. 3.5"></div>
                <div class="form-group"><label>Attach Photo/Video</label><input type="file" id="trek-media" accept="image/*,video/*"></div>
                <button id="post-trek-btn" class="submit-btn">Publish Post</button>
            </div>
        </div>

        <div id="profile-tab" class="app-section">
            <div class="card profile-header">
                <div class="avatar profile-avatar" id="profile-avatar-display"></div>
                <h2 style="margin: 0; font-size: 22px;">@<span id="profile-username">trekker</span></h2>
                <div class="profile-stats-container">
                    <div class="stat-box"><span class="stat-number" id="my-treks-count">0</span><span>Treks</span></div>
                    <div class="stat-box"><span class="stat-number" id="my-followers-count">0</span><span>Followers</span></div>
                    <div class="stat-box"><span class="stat-number" id="my-following-count">0</span><span>Following</span></div>
                </div>
                <button id="toggle-edit-btn" style="margin-top: 15px; padding: 8px 20px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 20px; font-weight: bold; cursor: pointer;">Edit Profile</button>
            </div>
            <div id="edit-profile-section">
                <h4 style="margin-top: 0;">Update Profile</h4>
                <div class="form-group"><label>New Username</label><input type="text" id="edit-username-input" placeholder="Enter new username"></div>
                <div class="form-group"><label>Profile Picture</label><input type="file" id="edit-pic-input" accept="image/*"></div>
                <button id="save-profile-btn" class="submit-btn" style="padding: 10px; font-size: 14px;">Save Changes</button>
            </div>
            <button id="logout-btn" style="width: 100%; padding: 12px; background: none; border: 1px solid var(--border-color); color: var(--danger); border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;">Log Out</button>
        </div>

        <div id="other-profile-tab" class="app-section">
            <div class="card profile-header">
                <div class="avatar profile-avatar" id="other-profile-avatar"></div>
                <h2 style="margin: 0; font-size: 22px;">@<span id="other-profile-username">user</span></h2>
                <div class="profile-stats-container">
                    <div class="stat-box"><span class="stat-number" id="other-treks-count">0</span><span>Treks</span></div>
                    <div class="stat-box"><span class="stat-number" id="other-followers-count">0</span><span>Followers</span></div>
                    <div class="stat-box"><span class="stat-number" id="other-following-count">0</span><span>Following</span></div>
                </div>
                <button id="follow-btn" style="margin-top: 15px; padding: 8px 30px; background: var(--primary-blue); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">Follow</button>
            </div>
            <h3 style="margin-left: 5px;">Their Treks</h3>
            <div id="other-user-feed-container"></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-target="home-tab" data-title="Home"><i class="fa-solid fa-house"></i> Home</button>
            <button class="nav-item" data-target="search-tab" data-title="Search Users"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            <button class="nav-item" data-target="trek-tab" data-title="Log Trek"><i class="fa-solid fa-plus-circle"></i> Trek</button>
            <button class="nav-item" data-target="profile-tab" data-title="My Profile"><i class="fa-regular fa-user"></i> Profile</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, setDoc, getDoc, getDocs, where, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUrzMwfSKvmcKFBYOF7uCL3M0ENUjAJUg",
            authDomain: "trekmania-644bd.firebaseapp.com",
            projectId: "trekmania-644bd",
            storageBucket: "trekmania-644bd.firebasestorage.app",
            messagingSenderId: "640274630515",
            appId: "1:640274630515:web:09d00eed0c5b38638ea706",
            measurementId: "G-58KT7CNVNY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let previousTab = 'home-tab';

        // --- AUTH & SYNC (WITH NEW PRIVACY GATE) ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                
                // PRIVACY GATE: If they don't have a custom username yet, lock them in onboarding
                if (!user.displayName) {
                    document.getElementById('main-app').style.display = 'none';
                    document.getElementById('onboarding-screen').style.display = 'flex';
                } else {
                    // Normal Login
                    document.getElementById('onboarding-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    
                    const displayUsername = user.displayName; // NO MORE EMAIL FALLBACK
                    document.getElementById('profile-username').innerText = displayUsername;
                    document.getElementById('edit-username-input').value = displayUsername;

                    if (user.photoURL) document.getElementById('profile-avatar-display').innerHTML = `<img src="${user.photoURL}">`;
                    else document.getElementById('profile-avatar-display').innerText = displayUsername.charAt(0).toUpperCase();

                    const userRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userRef);
                    if (!userDoc.exists()) {
                        await setDoc(userRef, { uid: user.uid, email: user.email, username: displayUsername, photoURL: user.photoURL || "", followers: [], following: [] });
                    } else {
                        await setDoc(userRef, { username: displayUsername, photoURL: user.photoURL || "" }, { merge: true });
                    }

                    onSnapshot(doc(db, "users", user.uid), (docSnapshot) => {
                        const data = docSnapshot.data();
                        if(data) {
                            document.getElementById('my-followers-count').innerText = data.followers?.length || 0;
                            document.getElementById('my-following-count').innerText = data.following?.length || 0;
                        }
                    });

                    onSnapshot(query(collection(db, "treks"), where("uid", "==", user.uid)), (snap) => {
                        document.getElementById('my-treks-count').innerText = snap.size;
                    });

                    loadFeed();
                }
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('onboarding-screen').style.display = 'none';
            }
        });

        // --- ONBOARDING COMPLETION ---
        document.getElementById('complete-onboarding-btn').addEventListener('click', async () => {
            const chosenName = document.getElementById('onboarding-username').value.trim();
            if (!chosenName) return alert("Please enter a username!");

            const btn = document.getElementById('complete-onboarding-btn');
            btn.innerText = "Saving..."; btn.disabled = true;

            try {
                // Attach custom name to Auth
                await updateProfile(auth.currentUser, { displayName: chosenName });
                
                // Create clean user profile in Database
                await setDoc(doc(db, "users", auth.currentUser.uid), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    username: chosenName,
                    photoURL: "",
                    followers: [],
                    following: []
                });
                
                // Reload the page instantly logs them in cleanly!
                window.location.reload(); 
            } catch (error) {
                alert("Error setting username.");
                btn.innerText = "Complete Setup"; btn.disabled = false;
            }
        });

        // Login & Signup Triggers
        document.getElementById('signup-btn').addEventListener('click', () => { createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch((error) => { document.getElementById('auth-error').innerText = error.message; document.getElementById('auth-error').style.display = 'block'; }); });
        document.getElementById('login-btn').addEventListener('click', () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(() => { document.getElementById('auth-error').innerText = "Invalid credentials."; document.getElementById('auth-error').style.display = 'block'; }); });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- EDIT PROFILE ---
        document.getElementById('toggle-edit-btn').addEventListener('click', () => { const section = document.getElementById('edit-profile-section'); section.style.display = section.style.display === 'block' ? 'none' : 'block'; });

        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            const newName = document.getElementById('edit-username-input').value;
            const newPicFile = document.getElementById('edit-pic-input').files[0];
            const btn = document.getElementById('save-profile-btn');
            let finalPhotoUrl = auth.currentUser.photoURL;
            btn.innerText = "Saving..."; btn.disabled = true;

            if (newPicFile) {
                const formData = new FormData(); formData.append("file", newPicFile); formData.append("upload_preset", "trekmania_preset");
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/difuiqzph/image/upload`, { method: "POST", body: formData });
                    const data = await res.json(); if(data.secure_url) finalPhotoUrl = data.secure_url;
                } catch (error) { alert("Failed to upload picture."); }
            }

            await updateProfile(auth.currentUser, { displayName: newName, photoURL: finalPhotoUrl });
            await setDoc(doc(db, "users", auth.currentUser.uid), { username: newName, photoURL: finalPhotoUrl || "" }, { merge: true });
            document.getElementById('profile-username').innerText = newName;
            if (finalPhotoUrl) document.getElementById('profile-avatar-display').innerHTML = `<img src="${finalPhotoUrl}">`;

            btn.innerText = "Save Changes"; btn.disabled = false; document.getElementById('edit-profile-section').style.display = 'none';
        });

        // --- POST TREK ---
        document.getElementById('post-trek-btn').addEventListener('click', async () => {
            const name = document.getElementById('trek-name').value;
            const elevation = document.getElementById('trek-elevation').value;
            const time = document.getElementById('trek-time').value;
            const mediaFile = document.getElementById('trek-media').files[0];
            const submitBtn = document.getElementById('post-trek-btn');

            if(!name || !elevation || !time) return alert("Fill all fields!");

            let mediaUrl = ""; let mediaType = "";
            if (mediaFile) {
                submitBtn.innerText = "Uploading..."; submitBtn.disabled = true;
                const formData = new FormData(); formData.append("file", mediaFile); formData.append("upload_preset", "trekmania_preset");
                try {
                    const resourceType = mediaFile.type.startsWith('video') ? 'video' : 'image';
                    const response = await fetch(`https://api.cloudinary.com/v1_1/difuiqzph/${resourceType}/upload`, { method: "POST", body: formData });
                    const data = await response.json(); if(data.secure_url) { mediaUrl = data.secure_url; mediaType = resourceType; }
                } catch (error) { alert("Upload failed."); submitBtn.innerText = "Publish Post"; submitBtn.disabled = false; return; }
            }

            submitBtn.innerText = "Saving Trek...";
            await addDoc(collection(db, "treks"), {
                trekName: name, elevation: elevation, time: time,
                userEmail: auth.currentUser.email, uid: auth.currentUser.uid,
                authorName: auth.currentUser.displayName, // NO FALLBACK
                authorPic: auth.currentUser.photoURL || "",
                mediaUrl: mediaUrl, mediaType: mediaType,
                likes: [], comments: [],
                createdAt: serverTimestamp()
            });

            document.getElementById('trek-name').value = ''; document.getElementById('trek-elevation').value = ''; document.getElementById('trek-time').value = ''; document.getElementById('trek-media').value = '';
            submitBtn.innerText = "Publish Post"; submitBtn.disabled = false;
            document.querySelector('[data-target="home-tab"]').click();
        });

        // --- INTERACTIVE ACTIONS (GLOBAL) ---
        window.toggleLike = async function(postId, isLiked) {
            const trekRef = doc(db, "treks", postId);
            if (isLiked) await updateDoc(trekRef, { likes: arrayRemove(auth.currentUser.uid) });
            else await updateDoc(trekRef, { likes: arrayUnion(auth.currentUser.uid) });
        };

        window.addComment = async function(postId) {
            const text = prompt("Write a comment:");
            if (text && text.trim().length > 0) {
                const trekRef = doc(db, "treks", postId);
                const commentData = {
                    uid: auth.currentUser.uid,
                    authorName: auth.currentUser.displayName, // NO FALLBACK
                    text: text.trim()
                };
                await updateDoc(trekRef, { comments: arrayUnion(commentData) });
            }
        };

        window.shareTrek = async function(trekName, time, elevation) {
            const shareUrl = "https://azaaaaad.github.io/Trekmania/";
            const shareText = `Check out this trek on Trekmania: ${trekName} (${time}h, ${elevation}m)!`;
            if (navigator.share) {
                try { await navigator.share({ title: 'Trekmania', text: shareText, url: shareUrl }); } catch (error) { console.log('Error sharing:', error); }
            } else {
                navigator.clipboard.writeText(`${shareText} ${shareUrl}`); alert("App link copied to clipboard!");
            }
        };

        window.toggleFollow = async function(targetUid) {
            const myRef = doc(db, "users", auth.currentUser.uid);
            const theirRef = doc(db, "users", targetUid);
            const myDoc = await getDoc(myRef);
            
            const isFollowing = (myDoc.data().following || []).includes(targetUid);
            if (isFollowing) {
                await updateDoc(myRef, { following: arrayRemove(targetUid) });
                await updateDoc(theirRef, { followers: arrayRemove(auth.currentUser.uid) });
                document.getElementById('follow-btn').innerText = "Follow"; document.getElementById('follow-btn').style.background = "var(--primary-blue)";
            } else {
                await updateDoc(myRef, { following: arrayUnion(targetUid) });
                await updateDoc(theirRef, { followers: arrayUnion(auth.currentUser.uid) });
                document.getElementById('follow-btn').innerText = "Unfollow"; document.getElementById('follow-btn').style.background = "var(--text-muted)";
            }
        };

        // --- VIEW OTHER PROFILES ---
        window.viewUser = async function(targetUid, targetUsername, targetPic) {
            if (targetUid === auth.currentUser.uid) { document.querySelector('[data-target="profile-tab"]').click(); return; }

            document.getElementById('header-back-btn').style.display = 'block';
            document.getElementById('header-title').innerText = "Profile";
            document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById('other-profile-tab').classList.add('active');

            document.getElementById('other-profile-username').innerText = targetUsername;
            document.getElementById('other-profile-avatar').innerHTML = targetPic ? `<img src="${targetPic}">` : targetUsername.charAt(0).toUpperCase();

            const followBtn = document.getElementById('follow-btn');
            followBtn.onclick = () => window.toggleFollow(targetUid);
            const myDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
            if ((myDoc.data().following || []).includes(targetUid)) { followBtn.innerText = "Unfollow"; followBtn.style.background = "var(--text-muted)"; } 
            else { followBtn.innerText = "Follow"; followBtn.style.background = "var(--primary-blue)"; }

            onSnapshot(doc(db, "users", targetUid), (docSnapshot) => {
                const data = docSnapshot.data();
                if(data) {
                    document.getElementById('other-followers-count').innerText = data.followers?.length || 0;
                    document.getElementById('other-following-count').innerText = data.following?.length || 0;
                }
            });

            const feedContainer = document.getElementById('other-user-feed-container');
            feedContainer.innerHTML = "<p style='text-align:center'>Loading posts...</p>";
            onSnapshot(query(collection(db, "treks"), where("uid", "==", targetUid)), (snap) => {
                document.getElementById('other-treks-count').innerText = snap.size;
                feedContainer.innerHTML = "";
                if (snap.empty) { feedContainer.innerHTML = "<p style='text-align:center; color:#888;'>No posts yet.</p>"; return; }
                
                snap.forEach((postDoc) => {
                    const post = postDoc.data();
                    const card = document.createElement('div'); card.className = 'card';
                    let mediaHtml = ''; if (post.mediaUrl) mediaHtml = `<img src="${post.mediaUrl}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin-top: 10px;">`;
                    card.innerHTML = `<h3 style="margin: 0 0 5px 0;">${post.trekName}</h3>${mediaHtml}<div class="post-stats"><div><strong>Time</strong><br>${post.time}h</div><div><strong>Elevation</strong><br>${post.elevation} m</div></div>`;
                    feedContainer.appendChild(card);
                });
            });
        };

        // --- BACK BUTTON LOGIC ---
        document.getElementById('header-back-btn').addEventListener('click', () => {
            document.getElementById('header-back-btn').style.display = 'none';
            document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(previousTab).classList.add('active');
            const activeNav = document.querySelector(`[data-target="${previousTab}"]`);
            if(activeNav) document.getElementById('header-title').innerText = activeNav.getAttribute('data-title');
        });

        // --- SEARCH LOGIC ---
        document.getElementById('search-input').addEventListener('input', async (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const resultsContainer = document.getElementById('search-results-container');
            if (searchTerm.length < 1) { resultsContainer.innerHTML = "<p style='text-align:center; color: var(--text-muted); font-size: 14px;'>Type a username to start searching</p>"; return; }

            const querySnapshot = await getDocs(collection(db, "users"));
            resultsContainer.innerHTML = ""; let matchCount = 0;

            querySnapshot.forEach((doc) => {
                const userData = doc.data();
                if (userData.username && userData.username.toLowerCase().includes(searchTerm)) {
                    matchCount++;
                    const picHtml = userData.photoURL ? `<img src="${userData.photoURL}" style="width:100%; height:100%; object-fit:cover;">` : userData.username.charAt(0).toUpperCase();
                    const item = document.createElement('div'); item.className = 'search-result-item';
                    item.onclick = () => viewUser(userData.uid, userData.username, userData.photoURL);
                    item.innerHTML = `<div class="avatar" style="width: 35px; height: 35px; font-size: 14px;">${picHtml}</div><div style="font-weight: bold;">@${userData.username}</div>`;
                    resultsContainer.appendChild(item);
                }
            });
            if(matchCount === 0) resultsContainer.innerHTML = "<p style='text-align:center; color: var(--text-muted);'>No trekkers found.</p>";
        });

        // --- LOAD FEED ---
        function loadFeed() {
            const q = query(collection(db, "treks"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feedContainer = document.getElementById('feed-container');
                feedContainer.innerHTML = "";
                if (snapshot.empty) return feedContainer.innerHTML = "<p style='text-align:center'>No treks yet.</p>";

                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const card = document.createElement('div'); card.className = 'card';
                    const isOwner = post.userEmail === auth.currentUser.email;
                    const deleteHtml = isOwner ? `<i class="fa-solid fa-trash delete-btn" data-id="${postDoc.id}"></i>` : '';

                    let mediaHtml = '';
                    if (post.mediaUrl) {
                        if (post.mediaType === 'video') mediaHtml = `<video src="${post.mediaUrl}" controls style="width: 100%; max-height: 400px; border-radius: 8px; margin-top: 10px; background: #000;"></video>`;
                        else mediaHtml = `<img src="${post.mediaUrl}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin-top: 10px;">`;
                    }

                    // Fallback to "Anonymous" only if it's an old test post from before the update
                    const displayPicUrl = post.authorPic ? post.authorPic : "";
                    const displayName = post.authorName || "Anonymous Trekker";
                    const displayPicHtml = post.authorPic ? `<img src="${post.authorPic}">` : displayName.charAt(0).toUpperCase();

                    const likesArray = post.likes || [];
                    const commentsArray = post.comments || [];
                    const isLiked = likesArray.includes(auth.currentUser.uid);
                    const likeClass = isLiked ? 'fa-solid liked' : 'fa-regular';

                    let commentsHtml = '';
                    if (commentsArray.length > 0) {
                        commentsHtml = `<div class="comments-display">` + 
                            commentsArray.map(c => `<div class="comment-item"><strong>${c.authorName}:</strong> ${c.text}</div>`).join('') 
                        + `</div>`;
                    }

                    const safeTrekName = post.trekName.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                    card.innerHTML = `
                        <div class="post-header">
                            <div class="post-user-info" onclick="viewUser('${post.uid}', '${displayName}', '${displayPicUrl}')">
                                <div class="avatar">${displayPicHtml}</div>
                                <div style="font-weight: bold; font-size: 15px;">@${displayName}</div>
                            </div>
                            ${deleteHtml}
                        </div>
                        <h3 style="margin: 10px 0 5px 0;">${post.trekName}</h3>
                        ${mediaHtml}
                        <div class="post-stats">
                            <div><strong>Time</strong><br>${post.time}h</div>
                            <div><strong>Elevation</strong><br>${post.elevation} m</div>
                        </div>
                        <div class="post-actions">
                            <div class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${postDoc.id}', ${isLiked})"><i class="${likeClass} fa-thumbs-up"></i> ${likesArray.length}</div>
                            <div class="action-btn" onclick="addComment('${postDoc.id}')"><i class="fa-regular fa-comment"></i> ${commentsArray.length}</div>
                            <div class="action-btn" onclick="shareTrek('${safeTrekName}', '${post.time}', '${post.elevation}')"><i class="fa-solid fa-share-nodes"></i> Share</div>
                        </div>
                        ${commentsHtml}
                    `;
                    feedContainer.appendChild(card);
                });

                document.querySelectorAll('.delete-btn').forEach(btn => { btn.addEventListener('click', async (e) => { if(confirm("Delete this trek?")) await deleteDoc(doc(db, "treks", e.target.getAttribute('data-id'))); }); });
            });
        }

        // --- TAB NAVIGATION ---
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('header-back-btn').style.display = 'none';
                document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                const targetId = btn.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
                btn.classList.add('active');
                document.getElementById('header-title').innerText = btn.getAttribute('data-title');
                previousTab = targetId; 
            });
        });
    </script>
</body>
</html>
