<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trekmania</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #007bff; --bg-color: #f4f6f8; --card-bg: #ffffff; --text-main: #333333; --text-muted: #888888; --border-color: #e0e0e0; --danger: #ff4d4f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        /* LOGIN SCREEN */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: var(--card-bg); padding: 20px; }
        .auth-form { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .auth-form h1 { text-align: center; color: var(--primary-blue); margin-bottom: 20px; }
        .auth-form input { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; }
        .auth-form button { padding: 14px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-form button.secondary { background-color: transparent; color: var(--primary-blue); border: 2px solid var(--primary-blue); }

        /* MAIN APP */
        #main-app { display: none; padding-bottom: 70px; }
        .app-header { background-color: var(--card-bg); padding: 15px 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .app-section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .app-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS & FEED */
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .post-user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background-color: var(--primary-blue); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-muted); margin-top: 10px; }
        
        /* ACTIONS (Likes, Comments, Delete) */
        .post-actions { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; color: var(--text-muted); font-size: 18px; }
        .action-btn { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .action-btn:hover { color: var(--primary-blue); }
        .delete-btn { color: var(--danger); cursor: pointer; padding: 5px; }
        .delete-btn:hover { opacity: 0.7; }

        /* FORMS */
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .form-group label { font-size: 14px; font-weight: bold; color: var(--text-main); }
        .form-group input, .form-group input[type="file"] { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; }
        .submit-btn { width: 100%; padding: 12px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* PROFILE LAYOUT */
        .profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 20px 0; }
        .profile-avatar { width: 90px; height: 90px; font-size: 36px; margin-bottom: 5px; }
        .profile-stats-container { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .stat-box { display: flex; flex-direction: column; align-items: center; font-size: 14px; color: var(--text-muted); }
        .stat-number { font-size: 20px; font-weight: bold; color: var(--text-main); }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 12px; gap: 5px; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--primary-blue); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-form">
            <h1>Trekmania</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password (min 6 chars)">
            <button id="login-btn">Log In</button>
            <button id="signup-btn" class="secondary">Sign Up (New User)</button>
            <p id="auth-error" style="color: red; font-size: 14px; text-align: center; display: none;"></p>
        </div>
    </div>

    <div id="main-app">
        <div class="app-header">
            <span id="header-title">Home</span>
        </div>

        <div id="home-tab" class="app-section active">
            <div id="feed-container">
                <p style="text-align:center; color: var(--text-muted);">Loading posts...</p>
            </div>
        </div>

        <div id="trek-tab" class="app-section">
            <div class="card">
                <h3 style="margin-top: 0;">Log a New Trek</h3>
                <div class="form-group">
                    <label>Trek Name</label>
                    <input type="text" id="trek-name" placeholder="e.g. Leopard's Trail">
                </div>
                <div class="form-group">
                    <label>Elevation Gain (m)</label>
                    <input type="number" id="trek-elevation" placeholder="e.g. 320">
                </div>
                <div class="form-group">
                    <label>Time (hours)</label>
                    <input type="number" id="trek-time" placeholder="e.g. 3.5">
                </div>
                <div class="form-group">
                    <label>Attach Photo/Video (Requires Backend Setup)</label>
                    <input type="file" id="trek-media" accept="image/*,video/*">
                </div>
                <button id="post-trek-btn" class="submit-btn">Publish Post</button>
            </div>
        </div>

        <div id="profile-tab" class="app-section">
            <div class="card profile-header">
                <div class="avatar profile-avatar" id="profile-avatar-display">U</div>
                <h2 style="margin: 0; font-size: 22px;">@<span id="profile-username">trekker</span></h2>
                <div style="font-size: 14px; color: var(--text-muted);" id="profile-email">email@example.com</div>
                
                <div class="profile-stats-container">
                    <div class="stat-box">
                        <span class="stat-number">0</span>
                        <span>Treks</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number">1</span>
                        <span>Followers</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number">1</span>
                        <span>Following</span>
                    </div>
                </div>
            </div>
            <button id="logout-btn" style="width: 100%; padding: 12px; background: none; border: 1px solid var(--border-color); color: var(--danger); border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;">Log Out</button>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-target="home-tab" data-title="Home">
                <i class="fa-solid fa-house"></i> Home
            </button>
            <button class="nav-item" data-target="trek-tab" data-title="Log Trek">
                <i class="fa-solid fa-plus-circle"></i> Trek
            </button>
            <button class="nav-item" data-target="profile-tab" data-title="Profile">
                <i class="fa-regular fa-user"></i> Profile
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // ADDED doc and deleteDoc imports
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUrzMwfSKvmcKFBYOF7uCL3M0ENUjAJUg",
            authDomain: "trekmania-644bd.firebaseapp.com",
            projectId: "trekmania-644bd",
            storageBucket: "trekmania-644bd.firebasestorage.app",
            messagingSenderId: "640274630515",
            appId: "1:640274630515:web:09d00eed0c5b38638ea706",
            measurementId: "G-58KT7CNVNY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTHENTICATION ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('profile-email').innerText = user.email;
                document.getElementById('profile-username').innerText = user.email.split('@')[0];
                document.getElementById('profile-avatar-display').innerText = user.email.charAt(0);
                loadFeed();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        document.getElementById('signup-btn').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch((error) => { document.getElementById('auth-error').innerText = error.message; document.getElementById('auth-error').style.display = 'block'; });
        });

        document.getElementById('login-btn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(() => { document.getElementById('auth-error').innerText = "Invalid email or password."; document.getElementById('auth-error').style.display = 'block'; });
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- DATABASE LOGIC ---
        document.getElementById('post-trek-btn').addEventListener('click', async () => {
            const name = document.getElementById('trek-name').value;
            const elevation = document.getElementById('trek-elevation').value;
            const time = document.getElementById('trek-time').value;

            if(!name || !elevation || !time) return alert("Please fill all text fields!");

            await addDoc(collection(db, "treks"), {
                trekName: name,
                elevation: elevation,
                time: time,
                userEmail: auth.currentUser.email,
                createdAt: serverTimestamp()
            });

            document.getElementById('trek-name').value = '';
            document.getElementById('trek-elevation').value = '';
            document.getElementById('trek-time').value = '';
            document.getElementById('trek-media').value = '';
            document.querySelector('[data-target="home-tab"]').click();
        });

        function loadFeed() {
            const q = query(collection(db, "treks"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const feedContainer = document.getElementById('feed-container');
                feedContainer.innerHTML = "";
                if (snapshot.empty) {
                    feedContainer.innerHTML = "<p style='text-align:center'>No treks yet. Be the first!</p>";
                    return;
                }

                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Check if current user owns the post to show delete button
                    const isOwner = post.userEmail === auth.currentUser.email;
                    const deleteHtml = isOwner ? `<i class="fa-solid fa-trash delete-btn" data-id="${postDoc.id}"></i>` : '';

                    card.innerHTML = `
                        <div class="post-header">
                            <div class="post-user-info">
                                <div class="avatar">${post.userEmail.charAt(0)}</div>
                                <div style="font-weight: bold; font-size: 15px;">@${post.userEmail.split('@')[0]}</div>
                            </div>
                            ${deleteHtml}
                        </div>
                        <h3 style="margin: 10px 0 5px 0;">${post.trekName}</h3>
                        <div class="post-stats">
                            <div><strong>Time</strong><br>${post.time}h</div>
                            <div><strong>Elevation</strong><br>${post.elevation} m</div>
                        </div>
                        <div class="post-actions">
                            <div class="action-btn"><i class="fa-regular fa-thumbs-up"></i> 0</div>
                            <div class="action-btn"><i class="fa-regular fa-comment"></i> 0</div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });

                // Attach delete listeners
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("Are you sure you want to delete this trek?")) {
                            const docId = e.target.getAttribute('data-id');
                            await deleteDoc(doc(db, "treks", docId));
                        }
                    });
                });
            });
        }

        // --- TAB NAVIGATION ---
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
                btn.classList.add('active');
                document.getElementById('header-title').innerText = btn.getAttribute('data-title');
            });
        });
    </script>
</body>
</html>
